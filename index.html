<!DOCTYPE html>
<html>
<head>
  <title>My Web</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, white, black);
      font-family: Arial;
    }

    /* Main button */
    #openBtn {
      background: blue;
      color: white;
      border: none;
      padding: 20px 40px;
      font-size: 22px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.1s;
    }

    #openBtn:active {
      background: white;
      color: blue;
    }

    /* Panel */
    .panel {
      display: none;
      position: absolute;
      background: pink;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .panel h1 {
      color: white;
      margin-bottom: 20px;
    }

    .panel button {
      display: block;
      width: 150px;
      margin: 10px auto;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: blue;
      color: black;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <button id="openBtn" onclick="openPanel()">Open Panel</button>

  <div class="panel" id="panel">
    <h1>Welcome</h1>
    <button>Login</button>
    <button>Sign Up</button>
  </div>

  <script>
    function openPanel() {
      let panel = document.getElementById("panel");
      let btn = document.getElementById("openBtn");

      // show panel
      panel.style.display = "block";

      // hide main button
      btn.style.display = "none";
    }
  </script>

</body>
</html>
