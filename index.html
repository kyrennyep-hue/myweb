<!DOCTYPE html>
<html>
<head>
  <title>My Web</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, white, black);
      font-family: Arial;
    }

    /* Main button */
    #openBtn {
      background: blue;
      color: white;
      border: none;
      padding: 25px 50px;
      font-size: 24px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    #openBtn:active {
      transform: scale(0.95);
      background: white;
      color: blue;
    }

    /* Panel */
    .panel {
      display: none;
      position: absolute;
      background: pink;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      width: 280px;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .panel.show {
      opacity: 1;
      transform: scale(1);
    }

    .panel h1 {
      color: white;
      margin-bottom: 20px;
    }

    /* Buttons inside panel */
    .panel button {
      display: block;
      width: 180px;
      margin: 12px auto;
      padding: 14px;
      font-size: 17px;
      border: none;
      border-radius: 10px;
      background: blue;
      color: black;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .panel button:active {
      transform: scale(0.95);
      background: white;
      color: blue;
    }

    /* Back button */
    .back {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 60px;
      padding: 6px;
      font-size: 14px;
    }

  </style>
</head>

<body>

  <!-- Main Button -->
  <button id="openBtn" onclick="openPanel()">Open Panel</button>

  <!-- Panel -->
  <div class="panel" id="panel">
    <button class="back" onclick="closePanel()">←</button>
    <h1>Welcome</h1>
    <button>Login</button>
    <button>Sign Up</button>
  </div>

  <script>
    function openPanel() {
      let panel = document.getElementById("panel");
      let btn = document.getElementById("openBtn");

      panel.style.display = "block";

      setTimeout(() => {
        panel.classList.add("show");
      }, 10);

      btn.style.display = "none";
    }

    function closePanel() {
      let panel = document.getElementById("panel");
      let btn = document.getElementById("openBtn");

      panel.classList.remove("show");

      setTimeout(() => {
        panel.style.display = "none";
        btn.style.display = "block";
      }, 300);
    }
  </script>

</body>
</html>
