<!DOCTYPE html>
<html>
<head>
  <title>My Web</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, white, black);
      font-family: Arial;
    }

    /* Main button */
    #openBtn {
      background: blue;
      color: white;
      border: none;
      padding: 25px 50px;
      font-size: 24px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    #openBtn:active {
      transform: scale(0.95);
      background: white;
      color: blue;
    }

    /* Panels */
    .panel {
      display: none;
      position: absolute;
      background: pink;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      width: 300px;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.3s ease;
    }

    .panel.show {
      opacity: 1;
      transform: scale(1);
    }

    h1 {
      color: white;
      margin-bottom: 20px;
    }

    label {
      color: black;
      display: block;
      margin-top: 10px;
      text-align: left;
    }

    /* Input fields (GitHub-like dark) */
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      background: #161b22; /* GitHub dark */
      color: white;
      outline: none;
    }

    input::placeholder {
      color: #8b949e;
    }

    /* Buttons */
    .panel button {
      display: block;
      width: 180px;
      margin: 12px auto;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: blue;
      color: black;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .panel button:active {
      transform: scale(0.95);
      background: white;
      color: blue;
    }

    /* Back button (smaller now) */
    .back {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 40px;
      padding: 4px;
      font-size: 12px;
    }

  </style>
</head>

<body>

  <!-- Main Button -->
  <button id="openBtn" onclick="openMain()">Open Panel</button>

  <!-- MAIN PANEL -->
  <div class="panel" id="mainPanel">
    <button class="back" onclick="closeMain()">←</button>
    <h1>Welcome</h1>
    <button>Login</button>
    <button onclick="openSignup()">Sign Up</button>
  </div>

  <!-- SIGNUP PANEL -->
  <div class="panel" id="signupPanel">
    <button class="back" onclick="backToMain()">←</button>
    <h1>Sign Up</h1>

    <label>Kebab Chakho darling:</label>
    <input type="text" placeholder="Enter username">

    <label>Kaala Laund lelo:</label>
    <input type="password" placeholder="Enter password">

    <button>Create Account</button>
  </div>

  <script>
    function openMain() {
      let panel = document.getElementById("mainPanel");
      let btn = document.getElementById("openBtn");

      panel.style.display = "block";
      setTimeout(() => panel.classList.add("show"), 10);
      btn.style.display = "none";
    }

    function closeMain() {
      let panel = document.getElementById("mainPanel");
      let btn = document.getElementById("openBtn");

      panel.classList.remove("show");
      setTimeout(() => {
        panel.style.display = "none";
        btn.style.display = "block";
      }, 300);
    }

    function openSignup() {
      let main = document.getElementById("mainPanel");
      let signup = document.getElementById("signupPanel");

      main.classList.remove("show");
      setTimeout(() => {
        main.style.display = "none";

        signup.style.display = "block";
        setTimeout(() => signup.classList.add("show"), 10);
      }, 300);
    }

    function backToMain() {
      let main = document.getElementById("mainPanel");
      let signup = document.getElementById("signupPanel");

      signup.classList.remove("show");
      setTimeout(() => {
        signup.style.display = "none";

        main.style.display = "block";
        setTimeout(() => main.classList.add("show"), 10);
      }, 300);
    }
  </script>

</body>
</html>
